version: "3.8"
services:
  postgres:
    image: postgis/postgis:17-3.4
    container_name: dea-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-root}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-toor}
      POSTGRES_DB: ${POSTGRES_DB:-samur_dea}
    ports:
      - "5555:5432"
    volumes:
      - postgres_data1:/var/lib/postgresql/data
    restart: unless-stopped

  face-blur:
    build:
      context: ./scripts/face_blur_service
      dockerfile: Dockerfile
    container_name: dea-face-blur-gpu
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=0
      - TF_FORCE_GPU_ALLOW_GROWTH=true
      - CUDA_VISIBLE_DEVICES=0
    ports:
      - "5000:5000"
    volumes:
      - ./scripts/face_blur_service:/app
      - face_blur_models:/app/models
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  libpostal:
    image: pelias/libpostal-service
    container_name: dea-libpostal
    ports:
      - "${LIBPOSTAL_PORT:-4400}:4400"
    restart: unless-stopped

  nominatim:
    image: mediagis/nominatim:4.4
    container_name: dea-nominatim
    environment:
      PBF_URL: https://download.geofabrik.de/europe/spain-latest.osm.pbf
      REPLICATION_URL: https://download.geofabrik.de/europe/spain-updates/
      NOMINATIM_PASSWORD: nominatim
      IMPORT_STYLE: full
    ports:
      - "${NOMINATIM_PORT:-8080}:8080"
    volumes:
      - nominatim_data:/var/lib/postgresql/14/main
      - nominatim_flatnode:/nominatim/flatnode
    restart: unless-stopped
    shm_size: 1g

volumes:
  postgres_data1:
  face_blur_models:
  nominatim_data:
  nominatim_flatnode:
