name: Build Android

on:
  push:
    branches: [main]
    paths:
      - "mobile/**"
    tags:
      - "mobile@*"
  workflow_dispatch:
    inputs:
      deploy_to_play_store:
        description: "Deploy to Google Play Store"
        required: false
        type: boolean
        default: false
      track:
        description: "Play Store track"
        required: false
        type: choice
        default: internal
        options:
          - internal
          - alpha
          - beta
          - production

# Minimal top-level permissions — jobs override as needed
permissions:
  contents: read

concurrency:
  group: build-android-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-android:
    name: Build Android APK & AAB
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('mobile/android/**/*.gradle*', 'mobile/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: npm ci
        working-directory: mobile

      - name: Build web assets (Vite)
        run: npm run build
        working-directory: mobile
        env:
          VITE_API_BASE_URL: "https://deamap.es"

      - name: Sync Capacitor
        run: npx cap sync android
        working-directory: mobile

      - name: Make gradlew executable
        run: chmod +x ./gradlew
        working-directory: mobile/android

      - name: Build Debug APK
        run: ./gradlew assembleDebug
        working-directory: mobile/android

      - name: Build Release AAB
        run: ./gradlew bundleRelease
        working-directory: mobile/android

      - name: Build Release APK
        run: ./gradlew assembleRelease
        working-directory: mobile/android

      - name: Sign Release APK
        if: env.ANDROID_SIGNING_KEY != ''
        uses: r0adkll/sign-android-release@349ebdef58775b1e0d8099458af0816dc79b6407 # v1
        with:
          releaseDirectory: mobile/android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_SIGNING_KEY }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
        env:
          ANDROID_SIGNING_KEY: ${{ secrets.ANDROID_SIGNING_KEY }}
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Sign Release AAB
        if: env.ANDROID_SIGNING_KEY != ''
        uses: r0adkll/sign-android-release@349ebdef58775b1e0d8099458af0816dc79b6407 # v1
        with:
          releaseDirectory: mobile/android/app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.ANDROID_SIGNING_KEY }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
        env:
          ANDROID_SIGNING_KEY: ${{ secrets.ANDROID_SIGNING_KEY }}
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Verify release signing
        if: env.ANDROID_SIGNING_KEY != ''
        run: |
          # Check for signed AAB (may be *-signed.aab or app-release.aab if signed in-place)
          AAB_COUNT=$(find mobile/android/app/build/outputs/bundle/release -name "*.aab" | wc -l)
          if [ "$AAB_COUNT" -eq 0 ]; then
            echo "::error::No AAB found in release directory — build or signing may have failed"
            exit 1
          fi
          echo "✅ Found $AAB_COUNT AAB file(s) in release directory"
          ls -la mobile/android/app/build/outputs/bundle/release/*.aab
        env:
          ANDROID_SIGNING_KEY: ${{ secrets.ANDROID_SIGNING_KEY }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: mobile/android/app/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: mobile/android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

  deploy-play-store:
    name: Deploy to Google Play Store
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-android
    if: startsWith(github.ref, 'refs/tags/mobile@') || (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_to_play_store == 'true')

    permissions:
      contents: read

    steps:
      - name: Download Release AAB
        uses: actions/download-artifact@v4
        with:
          name: release-aab
          path: artifacts

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@935ef9c68bb393a8e6116b1575626a7f5be3a7fb # v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: es.deamap.mobile
          releaseFiles: artifacts/*.aab
          track: ${{ github.event.inputs.track || 'internal' }}
          status: completed

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-android
    if: startsWith(github.ref, 'refs/tags/mobile@')

    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#mobile@}" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@c062e08bd532815e2082a7e09ce9f200309e996d # v2.2.1
        with:
          name: "DeaMap Mobile v${{ steps.version.outputs.version }}"
          generate_release_notes: true
          files: |
            artifacts/release-apk/*.apk
            artifacts/release-aab/*.aab
            artifacts/debug-apk/*.apk
