name: Build Android

on:
  # Legacy workflow — automated builds go through release-mobile-app.yml
  # Kept as manual fallback only
  workflow_dispatch:
    inputs:
      deploy_to_play_store:
        description: "Deploy to Google Play Store"
        required: false
        type: boolean
        default: false
      track:
        description: "Play Store track"
        required: false
        type: choice
        default: internal
        options:
          - internal
          - alpha
          - beta
          - production

# Minimal top-level permissions — jobs override as needed
permissions:
  contents: read

concurrency:
  group: build-android-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-android:
    name: Build Android APK & AAB
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('mobile/android/**/*.gradle*', 'mobile/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Android signing
        if: env.ANDROID_SIGNING_KEY != ''
        env:
          ANDROID_SIGNING_KEY: ${{ secrets.ANDROID_SIGNING_KEY }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # Write keystore from base64 secret
          mkdir -p mobile/keystores
          echo "$ANDROID_SIGNING_KEY" | base64 --decode > mobile/keystores/release.keystore
          # Create keystore.properties so Gradle uses release signing directly (V2/V3)
          cat > mobile/keystores/keystore.properties << EOF
          storeFile=../../keystores/release.keystore
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Install dependencies
        run: npm ci
        working-directory: mobile

      - name: Build web assets (Vite)
        run: npm run build
        working-directory: mobile
        env:
          VITE_API_BASE_URL: "https://deamap.es"

      - name: Sync Capacitor
        run: npx cap sync android
        working-directory: mobile

      - name: Make gradlew executable
        run: chmod +x ./gradlew
        working-directory: mobile/android

      - name: Build Debug APK
        run: ./gradlew assembleDebug
        working-directory: mobile/android

      - name: Build Release AAB
        run: ./gradlew bundleRelease
        working-directory: mobile/android

      - name: Build Release APK
        run: ./gradlew assembleRelease
        working-directory: mobile/android

      - name: Verify release signing
        run: |
          echo "=== Release AAB ==="
          ls -la mobile/android/app/build/outputs/bundle/release/*.aab
          echo "=== Release APK ==="
          ls -la mobile/android/app/build/outputs/apk/release/*.apk

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: mobile/android/app/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: mobile/android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

  deploy-play-store:
    name: Deploy to Google Play Store
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-android
    if: startsWith(github.ref, 'refs/tags/mobile@') || (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_to_play_store == 'true')

    permissions:
      contents: read

    steps:
      - name: Download Release AAB
        uses: actions/download-artifact@v4
        with:
          name: release-aab
          path: artifacts

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@935ef9c68bb393a8e6116b1575626a7f5be3a7fb # v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: es.deamap.mobile
          releaseFiles: artifacts/*.aab
          track: ${{ github.event.inputs.track || 'internal' }}
          status: completed

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-android
    if: startsWith(github.ref, 'refs/tags/mobile@')

    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#mobile@}" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@c062e08bd532815e2082a7e09ce9f200309e996d # v2.2.1
        with:
          name: "DeaMap Mobile v${{ steps.version.outputs.version }}"
          generate_release_notes: true
          files: |
            artifacts/release-apk/*.apk
            artifacts/release-aab/*.aab
            artifacts/debug-apk/*.apk
