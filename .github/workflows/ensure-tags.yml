name: Ensure Version Tags

on:
  push:
    branches: [main]

concurrency:
  group: ensure-tags
  cancel-in-progress: false

jobs:
  ensure-tags:
    name: Create missing version tags
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Ensure mobile tag
        id: mobile-tag
        run: |
          if [ -f mobile/version.json ]; then
            VERSION=$(node -e "console.log(require('./mobile/version.json').version)")
            TAG="mobile@${VERSION}"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"

            if git rev-parse "$TAG" >/dev/null 2>&1; then
              echo "✅ Tag $TAG already exists — skipping"
              echo "created=false" >> "$GITHUB_OUTPUT"
            else
              echo "📦 Creating tag $TAG"
              git tag "$TAG"
              git push origin "$TAG"
              echo "✅ Tag $TAG created and pushed"
              echo "created=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "⚠️ mobile/version.json not found — skipping mobile tag"
            echo "created=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger mobile release workflow
        if: steps.mobile-tag.outputs.created == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "🚀 Triggering release workflow for v${{ steps.mobile-tag.outputs.version }}"
          gh workflow run release-mobile-app.yml \
            -f version=${{ steps.mobile-tag.outputs.version }} \
            -f deploy_android=true \
            -f deploy_ios=true \
            -f android_track=internal

      - name: Ensure web tag
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          TAG="web@${VERSION}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "✅ Tag $TAG already exists — skipping"
          else
            echo "📦 Creating tag $TAG"
            git tag "$TAG"
            git push origin "$TAG"
            echo "✅ Tag $TAG created and pushed"
          fi
