# Dependabot configuration for automatic dependency updates
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Enable version updates for npm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Madrid"
    # Keep pull requests grouped by update type
    groups:
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      development-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    # Increase the number of open pull requests allowed
    open-pull-requests-limit: 10
    # Add labels to pull requests for easy filtering
    labels:
      - "dependencies"
      - "automated"
    # Add reviewers (optional - can be configured later)
    # reviewers:
    #   - "username"
    # Add assignees (optional - can be configured later)
    # assignees:
    #   - "username"
    # Prefix commit messages
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    # Allow both direct and indirect updates
    versioning-strategy: auto

  # Enable version updates for GitHub Actions (if workflows exist)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
      - "automated"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
